# ==============================================================================
# common.conf - Krateo platform configuration
# ==============================================================================
# Used by: initialize_krateo.sh and other Krateo setup scripts
# Purpose: Core platform versions, repositories, and Krateo stack configuration
# Reference: /releases/krateo.nodeport.yaml
# ==============================================================================

# Krateo installation
KRATEO_VERSION="3.0.0-rc1"
KRATEO_PROFILE="debug"
KRATEO_SYSTEM_NAMESPACE="krateo-system"
DEMO_SYSTEM_NAMESPACE="demo-system"
KRATEO_INSTALL_INIT_SECRETS=true

# ============================================================================
# Helm Repository Mappings
# Maps repository names to their URLs (used by krateoctl)
# ============================================================================

# Krateo core services
KRATEO_CHARTS_REPO_URL="https://charts.krateo.io"

# CloudNative PG (PostgreSQL operator and cluster)
CLOUDNATIVE_PG_REPO_URL="https://cloudnative-pg.github.io/charts"

# ArgoCD for GitOps
ARGO_REPO_URL="https://argoproj.github.io/argo-helm"

# Prometheus/Grafana stack
PROMETHEUS_REPO_URL="https://prometheus-community.github.io/helm-charts"

# Marketplace for portal and compositions
MARKETPLACE_REPO_URL="https://marketplace.krateo.io"

# ============================================================================
# Krateo Platform Components (via krateoctl)
# Complete stack structure follows krateo.nodeport.yaml
# Versions are managed by krateoctl based on KRATEO_VERSION
# ============================================================================

# Backend services (authn, snowplow, events)
# Database backend (CNPG, PostgreSQL)
# Resource stack (resources ingester/presenter)
# Events stack (events ingester/presenter)
# Frontend UI
# Composition engine (core-provider, oasgen-provider)
# Optional: FinOps stack, OPA policy engine

# ============================================================================
# Service Port Mappings (NodePort)
# Exposed via KIND cluster port mappings in create_kind_cluster.sh
# ============================================================================

# Frontend Portal
KRATEO_PORTAL_PORT=30080

# Core services
KRATEO_AUTHN_PORT=30082
KRATEO_SNOWPLOW_PORT=30081
KRATEO_EVENTS_PORT=30083

# Optional: FinOps
KRATEO_FINOPS_PORT=30086

# ============================================================================
# Composition Definition (fixed for this environment)
# ============================================================================

COMPOSITION_DEF_NAME="portal-blueprint-page"
COMPOSITION_DEF_REPO="portal-blueprint-page"
COMPOSITION_DEF_URL="https://marketplace.krateo.io"
COMPOSITION_DEF_VERSION="1.0.6"

# ============================================================================
# Portal Blueprint Page (fixed for this environment)
# ============================================================================

PORTAL_INSTANCE_NAME="github-scaffolding-with-composition-page"
PORTAL_BLUEPRINT_REPO="github-scaffolding-with-composition-page"
PORTAL_BLUEPRINT_URL="https://marketplace.krateo.io"
PORTAL_BLUEPRINT_VERSION="1.2.4"
PORTAL_BLUEPRINT_HAS_PAGE=true
PORTAL_BLUEPRINT_ICON="fa-cubes"

# ============================================================================
# Timeouts
# ============================================================================

DEFAULT_TIMEOUT=300
CRD_TIMEOUT=300
DEPLOYMENT_TIMEOUT=600
