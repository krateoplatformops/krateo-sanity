# ==============================================================================
# stresstest.conf - Stress test configuration
# ==============================================================================
# Used by: stresstest_*.sh, monitor.sh
# Purpose: Test execution parameters, monitoring, GitHub credentials
# ==============================================================================

# Test namespaces
STRESSTEST_NAMESPACE="stresstest-system"
MONITORING_NAMESPACE="monitoring"
DEMO_SYSTEM_NAMESPACE="demo-system"
KUBE_SYSTEM_NAMESPACE="kube-system"

# GitHub test credentials
GITHUB_ORG_SOURCE="krateoplatformops-blueprints"
GITHUB_ORG_TARGET="krateoplatformops-test"
GITHUB_REPO_SOURCE="github-scaffolding-lifecycle"
GITHUB_REPO_TARGET="postdemoday-1"
GITHUB_BRANCH="main"
GITHUB_SECRET_NAMESPACE="krateo-system"
GITHUB_SECRET_NAME="github-repo-creds"
GITHUB_SECRET_KEY="token"

# Stress test resource creation
DEFAULT_RESOURCE_START=1
DEFAULT_RESOURCE_END=5
RESOURCE_PREFIX="stresstest-resource"

# Monitoring configuration
MONITORING_INTERVAL=60              # Seconds between snapshots
MONITORING_DURATION_MINUTES=120     # Total duration in minutes
MONITORING_LOG_PREFIX="memory_snapshots"

# Monitoring stack
KUBE_PROMETHEUS_VERSION="latest"
PROMETHEUS_REPO_URL="https://prometheus-community.github.io/helm-charts"
GRAFANA_ADMIN_PASSWORD="admin"
GRAFANA_PORT="3000"

# Metrics
METRICS_SERVER_URL="https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.5.0/components.yaml"

# Platform versions and repositories (from common.conf)
KRATEO_REPO_URL="https://charts.krateo.io"
GITHUB_PROVIDER_VERSION="1.0.0"
GIT_PROVIDER_VERSION="0.10.1"
ARGOCD_VERSION="8.0.17"
CRD_TIMEOUT=300

# Timeouts for test operations
DEPLOYMENT_TIMEOUT=600

# Test resource parameters (defines what resources are tested)
STRESSTEST_API_GROUP="composition.krateo.io"
STRESSTEST_RESOURCE_KIND="GithubScaffoldingWithCompositionPage"
STRESSTEST_TARGET_STATUS="False"
